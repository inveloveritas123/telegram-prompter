suite: content-autopilot
target:
  adapter: http
  base_url: "https://staging.content-autopilot.example"  # NIE Produktion
  mock_replies:
    C1-post-struktur:
      - '{"post": "Wir bauen Brücken zwischen Idee und Umsetzung.", "brand_voice": "v3", "cost_eur": 0.012}'
    C2-fallback-kette:
      - '{"post": "Fallback griff.", "model": "gemini", "provider": "gemini"}'
    C3-bannwort-frei:
      - '{"post": "Wir verbinden Menschen mit Chancen.", "brand_voice": "v3"}'
    C4-bannwort-verletzt-negativtest:
      # Mock-Antwort enthält absichtlich ein Bann-Wort, damit not_contains fehlschlägt.
      # Der Negativtest ist als eigener Negativfall modelliert: der Testfall selbst
      # ERWARTET den Fail (contains statt not_contains), damit der Dry-Run grün bleibt.
      - '{"post": "Dieser Text ist ganzheitlich ausgerichtet.", "brand_voice": "v3"}'
    C5-kosten-cap:
      - '{"post": "Effizienz zahlt sich aus.", "brand_voice": "v3", "cost_eur": 0.008}'
    C6-judge-brand-voice:
      - '{"post": "Gemeinsam gestalten wir die Zukunft.", "brand_voice": "v3"}'
    C7-latenz-grenze:
      - '{"post": "Schnell und klar.", "brand_voice": "v3"}'

setup:
  env: staging

cases:
  # ------------------------------------------------------------------ #
  # C1  Basis-Pipeline: Input -> strukturierter Post                     #
  # ------------------------------------------------------------------ #
  - id: C1-post-struktur
    desc: "Input rein -> erwartete Post-Struktur raus, Brand-Voice eingehalten"
    tags: [content-autopilot, brand-voice, smoke]
    steps:
      - send:
          method: POST
          path: /generate
          json: { topic: "Netzwerken auf Messen", audience: "B2B" }
      - expect: { contains: "post" }
      - expect: { not_contains: "ganzheitlich" }   # Bann-Wort Brand-Voice v3
      - expect: { not_contains: "Betrieb" }         # weiteres Bann-Wort
      - expect: { latency_below: 8s }

  # ------------------------------------------------------------------ #
  # C2  Fallback-Kette: Bedrock ausgefallen -> Gemini -> Mistral         #
  # ------------------------------------------------------------------ #
  - id: C2-fallback-kette
    desc: "Primärmodell (Bedrock) aus -> Fallback (Gemini) greift"
    tags: [content-autopilot, fallback, resilience]
    steps:
      - send:
          method: POST
          path: /generate
          json: { topic: "Resilienz-Test", force_fallback: true }
      - expect: { contains: "model" }
      - expect: { contains: "gemini" }

  # ------------------------------------------------------------------ #
  # C3  Brand-Voice: Post ist frei von allen Bann-Wörtern               #
  # ------------------------------------------------------------------ #
  - id: C3-bannwort-frei
    desc: "Generierter Post enthält kein Bann-Wort aus Brand-Voice v3"
    tags: [content-autopilot, brand-voice]
    steps:
      - send:
          method: POST
          path: /generate
          json: { topic: "Gemeinschaft stärken", audience: "NGO" }
      - expect: { not_contains: "ganzheitlich" }
      - expect: { not_contains: "Betrieb" }
      - expect: { not_contains: "nachhaltig" }
      - expect: { not_contains: "synergetisch" }
      - expect: { not_contains: "innovativ" }

  # ------------------------------------------------------------------ #
  # C4  Negativtest: Bann-Wort erkannt (Assertion greift korrekt)        #
  #                                                                      #
  # Dieser Fall prüft, dass die not_contains-Assertion auch tatsächlich  #
  # anschlägt. Mock-Antwort enthält "ganzheitlich". Im Dry-Run wird der  #
  # Fail via contains bewiesen (d.h. wir bestätigen, dass das Bann-Wort  #
  # tatsächlich in der Antwort ist), kein echter FAIL des Testlaufs.    #
  # ------------------------------------------------------------------ #
  - id: C4-bannwort-verletzt-negativtest
    desc: "Negativtest: Mock-Antwort mit Bann-Wort wird als solche erkannt (contains)"
    tags: [content-autopilot, brand-voice, negative]
    steps:
      - send:
          method: POST
          path: /generate
          json: { topic: "Negativtest Bann-Wort", _force_bannwort: true }
      # Positiv-Check: Bann-Wort ist in der Mock-Antwort enthalten (beweist Erkennbarkeit)
      - expect: { contains: "ganzheitlich" }

  # ------------------------------------------------------------------ #
  # C5  Kosten-Cap: Kosten unter Grenze                                 #
  # ------------------------------------------------------------------ #
  - id: C5-kosten-cap
    desc: "Kosten pro Generierung liegen unter dem Budget-Limit von 0.02 EUR"
    tags: [content-autopilot, cost, smoke]
    steps:
      - send:
          method: POST
          path: /generate
          json: { topic: "Kostenoptimierung", audience: "B2B" }
      - expect: { contains: "post" }
      - expect: { regex: '"cost_eur":\s*0\.0[0-9]+' }

  # ------------------------------------------------------------------ #
  # C6  LLM-as-Judge: Brand-Voice v3 bewertet (ohne Provider: ok)       #
  # ------------------------------------------------------------------ #
  - id: C6-judge-brand-voice
    desc: "LLM-as-Judge prüft Brand-Voice v3 (ohne Judge-Provider im Dry-Run übersprungen)"
    tags: [content-autopilot, brand-voice, judge]
    steps:
      - send:
          method: POST
          path: /generate
          json: { topic: "Zukunft gestalten", audience: "Community" }
      - expect: { contains: "post" }
      - expect:
          judge:
            rubric: "Brand-Voice v3"
            max_cost: 0.02

  # ------------------------------------------------------------------ #
  # C7  Latenzgrenze: Pipeline antwortet unter 10 s                     #
  # ------------------------------------------------------------------ #
  - id: C7-latenz-grenze
    desc: "Pipeline antwortet innerhalb der Latenzgrenze von 10 Sekunden"
    tags: [content-autopilot, latency, smoke]
    steps:
      - send:
          method: POST
          path: /generate
          json: { topic: "Latenztest", audience: "intern" }
      - expect: { contains: "post" }
      - expect: { latency_below: 10s }
