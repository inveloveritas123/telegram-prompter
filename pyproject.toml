[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["zukunftsbund-bottests", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# E402 is intentional in prompter/server.py (sys.path must be set before imports)
ignore = []

[tool.ruff.lint.per-file-ignores]
"prompter/server.py" = ["E402"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
files = ["admin", "orchestrator", "prompter"]
exclude = ["zukunftsbund-bottests", ".venv", "tests"]

# bandit is configured via .bandit (INI format) — see .bandit in repo root
