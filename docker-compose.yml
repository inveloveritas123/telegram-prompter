services:
  prompter-mcp:
    build:
      context: .
      dockerfile: Dockerfile.prompter
    # KEIN Host-Port: der MCP-Server ist nur intern über das Compose-Netz
    # (orchestrator -> prompter-mcp:8080) erreichbar. So gibt es keine offene
    # Test-Trigger-Schnittstelle nach außen. Falls ein Host-Client doch zugreifen
    # muss, NUR an Loopback binden: "127.0.0.1:8080:8080".
    expose:
      - "8080"
    volumes:
      - ./zukunftsbund-bottests:/app/zukunftsbund-bottests:ro
      - reports:/data/reports
    env_file: .env
    networks:
      - telegram-prompter-net

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    volumes:
      - ./zukunftsbund-bottests:/app/zukunftsbund-bottests:rw
      - ./config:/app/config:rw
      - reports:/data/reports
      - state:/app/state
      # SICHERHEIT: mountet die Host-Claude-Session (OAuth-Token) read-only in den
      # Orchestrator — nötig für ORCHESTRATOR_ENGINE=claude ohne API-Key. Der
      # Container hat KEINEN inbound-Port; bei mock-Engine wird das Token nicht
      # genutzt. Für strengere Trennung später ein dediziertes Headless-Token statt
      # der persönlichen Session verwenden.
      - ${HOME}/.claude:/root/.claude:ro
    env_file: .env
    networks:
      - telegram-prompter-net
    # Kein Standardbefehl — statt `docker compose up` nutze:
    # docker compose run --rm orchestrator tick
    # Für Dry-Run: docker compose run --rm orchestrator --dry-run
    command: ["sleep", "infinity"]

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    ports:
      # NUR an Loopback — das Panel ist nicht aus dem Internet erreichbar.
      # Zugriff vom Arbeitsplatz via SSH-Tunnel: ssh -L 8000:127.0.0.1:8000 server
      - "127.0.0.1:8000:8000"
    volumes:
      - ./config:/app/config:rw
      - reports:/data/reports:ro
      - state:/app/state:ro
    env_file: .env
    networks:
      - telegram-prompter-net

volumes:
  reports:
  state:

networks:
  telegram-prompter-net:
    driver: bridge
